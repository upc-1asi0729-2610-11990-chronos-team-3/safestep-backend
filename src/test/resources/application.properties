spring.application.name=SafeStep Platform Test
spring.datasource.url=jdbc:h2:mem:safestep_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7
spring.messages.basename=messages
spring.messages.encoding=UTF-8
documentation.application.description=SafeStep Platform Test
documentation.application.version=1.0.0
